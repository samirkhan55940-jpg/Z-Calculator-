name: "Build Zeeshan Pro Calculator (Language & Voice Update)"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Directories (With Language Folders)"
        run: |
          mkdir -p app/src/main/java/com/zeeshan/calculator
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-hi
          mkdir -p app/src/main/res/values-ur
          mkdir -p app/src/main/res/values-night
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-xhdpi

      - name: "4. Initialize Clean Gradle System (4GB RAM Fix)"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }
          rootProject.name = "ZeeshanProCalc"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. Android Native Config (Master Packaging Fix)"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.calculator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.calculator'
                  minSdk 26
                  targetSdk 34
                  versionCode 19
                  versionName "19.0-MultiLang-Voice"
              }
              buildTypes {
                  debug { minifyEnabled false; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' }
                  release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              
              packaging {
                  resources {
                      pickFirsts += "**/*.xsd"
                      excludes += "META-INF/DEPENDENCIES"
                      excludes += "META-INF/LICENSE"
                      excludes += "META-INF/LICENSE.txt"
                      excludes += "META-INF/NOTICE"
                      excludes += "META-INF/NOTICE.txt"
                      excludes += "META-INF/ASL2.0"
                      excludes += "META-INF/*.kotlin_module"
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat << 'EOF' > app/proguard-rules.pro
          -keep class com.zeeshan.calculator.** { *; }
          -dontwarn org.**
          -dontwarn java.lang.management.**
          EOF

      - name: "6. Create Azaad Strings (English, Hindi, Urdu)"
        run: |
          # English
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Z+² Calculator</string>
              <string name="menu_title">Menu</string>
              <string name="nav_history">View History</string>
              <string name="nav_theme">Theme Mode</string>
              <string name="lang_label">Script Language:</string>
              <string name="mic_error">Voice Error</string>
              <string name="clear_history">Clear All</string>
              <string name="close">Close</string>
              <string name="history_title">10MB Persistent History</string>
              <string name="error_msg">Error</string>
              <string name="back">Back</string>
          </resources>
          EOF

          # Hindi
          cat << 'EOF' > app/src/main/res/values-hi/strings.xml
          <resources>
              <string name="app_name">Z+² Calculator</string>
              <string name="menu_title">मेन्यू</string>
              <string name="nav_history">इतिहास देखें</string>
              <string name="nav_theme">थीम बदलें</string>
              <string name="lang_label">भाषा:</string>
              <string name="mic_error">आवाज़ में त्रुटि</string>
              <string name="clear_history">साफ़ करें</string>
              <string name="close">बंद करें</string>
              <string name="history_title">१०MB मेमोरी इतिहास</string>
              <string name="error_msg">त्रुटि</string>
              <string name="back">वापस</string>
          </resources>
          EOF

          # Urdu
          cat << 'EOF' > app/src/main/res/values-ur/strings.xml
          <resources>
              <string name="app_name">Z+² Calculator</string>
              <string name="menu_title">مینو</string>
              <string name="nav_history">ہسٹری دیکھیں</string>
              <string name="nav_theme">تھیم بدلیں</string>
              <string name="lang_label">زبان:</string>
              <string name="mic_error">آواز میں خرابی</string>
              <string name="clear_history">صاف کریں</string>
              <string name="close">بند کریں</string>
              <string name="history_title">10 ایم بی ہسٹری</string>
              <string name="error_msg">خرابی</string>
              <string name="back">واپس</string>
          </resources>
          EOF

      - name: "7. Theme Visuals & Colors"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_main">#F0F2F5</color>
              <color name="btn_num">#FFFFFF</color>
              <color name="btn_top">#E0E5EC</color>
              <color name="btn_op">#FF9800</color>
              <color name="text_main">#2A3543</color>
              <color name="text_sec">#8A9AAB</color>
              <color name="text_live_preview">#4CAF50</color> 
              <color name="brand_color">#1B5E20</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values-night/colors.xml
          <resources>
              <color name="bg_main">#1A212D</color>
              <color name="btn_num">#2C3A4A</color>
              <color name="btn_top">#344152</color>
              <color name="btn_op">#00E676</color>
              <color name="text_main">#FFFFFF</color>
              <color name="text_sec">#8A9AAB</color>
              <color name="text_live_preview">#00E676</color>
              <color name="brand_color">#00FF87</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZeeshanCalc" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:windowBackground">@color/bg_main</item>
                  <item name="android:statusBarColor">@color/bg_main</item>
              </style>
          </resources>
          EOF

      - name: "8. Create UI Drawables"
        run: |
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_num.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="@color/btn_num"/><stroke android:width="1dp" android:color="#1A000000"/></shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_top.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="@color/btn_top"/></shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_op.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="@color/btn_op"/></shape>
          EOF
          cat << 'EOF' > app/src/main/res/drawable/bg_btn_zero.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="@color/btn_num"/><corners android:radius="40dp"/><stroke android:width="1dp" android:color="#1A000000"/></shape>
          EOF

      - name: "9. 3D Dark Custom Icon"
        run: |
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0D0D0D" android:pathData="M15,15 h78 a15,15 0 0,1 15,15 v78 a15,15 0 0,1 -15,15 h-78 a15,15 0 0,1 -15,-15 v-78 a15,15 0 0,1 15,-15 z"/>
              <path android:fillColor="#1C1F24" android:pathData="M15,10 h78 a15,15 0 0,1 15,15 v78 a15,15 0 0,1 -15,15 h-78 a15,15 0 0,1 -15,-15 v-78 a15,15 0 0,1 15,-15 z"/>
              <path android:fillColor="#333333" android:pathData="M53,10h2v90h-2z"/>
              <path android:fillColor="#333333" android:pathData="M10,53h90v2h-90z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M25,31 h20 v4 h-20 z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M65,25 l4,-4 l8,8 l8,-8 l4,4 l-8,8 l8,8 l-4,4 l-8,-8 l-8,8 l-4,-4 l8,-8 z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M33,65 h4 v8 h8 v4 h-8 v8 h-4 v-8 h-8 v-4 h8 z"/>
              <path android:fillColor="#0D47A1" android:pathData="M55,55l30,-15v50l-30,15z"/>
              <path android:fillColor="#1976D2" android:pathData="M55,55l30,10v50l-30,-10z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M62,72 h18 v3 h-18 z M62,80 h18 v3 h-18 z"/>
          </vector>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher_round.xml

      - name: "10. UI Layout XML (With Voice Toggle)"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.drawerlayout.widget.DrawerLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/drawer_layout" android:layout_width="match_parent" android:layout_height="match_parent">

              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent" android:background="@color/bg_main">
                  
                  <LinearLayout android:id="@+id/top_bar" android:layout_width="match_parent" android:layout_height="60dp" android:orientation="horizontal" android:gravity="center_vertical" android:padding="10dp">
                      <Button android:id="@+id/btn_menu" android:layout_width="45dp" android:layout_height="45dp" android:background="@drawable/bg_btn_top" android:text="≡" android:textColor="@color/text_main" android:textSize="22sp"/>
                      <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="@string/app_name" android:textColor="@color/text_main" android:textSize="20sp" android:textStyle="bold" android:gravity="center"/>
                      <Button android:id="@+id/btn_speaker" android:layout_width="45dp" android:layout_height="45dp" android:background="@drawable/bg_btn_top" android:text="🔊" android:textColor="@color/text_main" android:textSize="18sp" android:layout_marginEnd="5dp"/>
                      <Button android:id="@+id/btn_mic" android:layout_width="45dp" android:layout_height="45dp" android:background="@drawable/bg_btn_top" android:text="🎤" android:textColor="@color/text_main" android:textSize="18sp"/>
                  </LinearLayout>

                  <LinearLayout android:id="@+id/calc_container" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/top_bar" android:orientation="vertical" android:padding="20dp">
                      
                      <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:orientation="vertical" android:gravity="bottom|end" android:paddingBottom="20dp">
                          <TextView android:id="@+id/tv_live_preview" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="" android:textColor="@color/text_live_preview" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:id="@+id/tv_expression" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="" android:textColor="@color/text_sec" android:textSize="32sp" android:layout_marginTop="5dp"/>
                          <TextView android:id="@+id/tv_display" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0" android:textColor="@color/text_main" android:textSize="64sp" android:maxLines="1"/>
                      </LinearLayout>

                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="AC" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="(" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text=")" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="22sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="÷" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="7" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="8" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="9" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="×" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="4" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="5" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="6" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="-" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="32sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginBottom="12dp">
                              <androidx.appcompat.widget.AppCompatButton android:text="1" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="2" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="3" android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="+" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal">
                              <androidx.appcompat.widget.AppCompatButton android:text="0" android:textColor="@color/text_main" android:background="@drawable/bg_btn_zero" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="." android:textColor="@color/text_main" android:background="@drawable/bg_btn_num" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="24sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="DEL" android:textColor="@color/text_main" android:background="@drawable/bg_btn_top" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="12dp" android:textSize="18sp"/>
                              <androidx.appcompat.widget.AppCompatButton android:text="=" android:textColor="#FFFFFF" android:background="@drawable/bg_btn_op" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:textSize="28sp"/>
                          </LinearLayout>
                      </LinearLayout>
                  </LinearLayout>
              </RelativeLayout>

              <LinearLayout android:layout_width="260dp" android:layout_height="match_parent" android:layout_gravity="start" android:background="@color/bg_main" android:orientation="vertical" android:padding="20dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="@string/menu_title" android:textSize="26sp" android:textStyle="bold" android:textColor="@color/brand_color" android:layout_marginBottom="30dp"/>
                  <Button android:id="@+id/nav_history" android:layout_width="match_parent" android:layout_height="50dp" android:text="@string/nav_history" android:background="@drawable/bg_btn_top" android:textColor="@color/text_main" android:layout_marginBottom="15dp"/>
                  <Button android:id="@+id/nav_theme" android:layout_width="match_parent" android:layout_height="50dp" android:text="@string/nav_theme" android:background="@drawable/bg_btn_top" android:textColor="@color/text_main" android:layout_marginBottom="15dp"/>
                  
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="@string/lang_label" android:textColor="@color/text_sec" android:layout_marginBottom="5dp"/>
                  <Spinner android:id="@+id/nav_language" android:layout_width="match_parent" android:layout_height="40dp" android:background="@drawable/bg_btn_top" android:padding="5dp"/>
              </LinearLayout>
          </androidx.drawerlayout.widget.DrawerLayout>
          EOF

      - name: "10.1 Create Full-Screen History Layout XML"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_history.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/bg_main" android:padding="16dp">

              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical" android:layout_marginBottom="20dp">
                  <Button android:id="@+id/btn_back" android:layout_width="wrap_content" android:layout_height="40dp" android:background="@drawable/bg_btn_top" android:text="@string/back" android:textColor="@color/text_main"/>
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="@string/history_title" android:textColor="@color/brand_color" android:textSize="20sp" android:textStyle="bold" android:gravity="center"/>
                  <Button android:id="@+id/btn_clear" android:layout_width="wrap_content" android:layout_height="40dp" android:background="@drawable/bg_btn_op" android:text="@string/clear_history" android:textColor="#FFFFFF"/>
              </LinearLayout>

              <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                  <TextView android:id="@+id/tv_history_content" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="@color/text_main" android:textSize="18sp" android:lineSpacingExtra="8dp"/>
              </ScrollView>
          </LinearLayout>
          EOF

      - name: "11. AndroidManifest"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <queries><intent><action android:name="android.intent.action.TTS_SERVICE" /></intent></queries>
              <application android:label="@string/app_name" android:supportsRtl="true" android:theme="@style/Theme.ZeeshanCalc" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round">
                  <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <activity android:name=".HistoryActivity" android:exported="false" />
              </application>
          </manifest>
          EOF

      - name: "12. Three Powerful Engines"
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/Engines.java
          package com.zeeshan.calculator;
          import android.content.Context;
          import java.io.*;
          import java.text.NumberFormat;
          import java.util.ArrayList;
          import java.util.Locale;

          public class Engines {
              
              public static class MathEngine {
                  public static String formatIndian(double value) {
                      NumberFormat format = NumberFormat.getInstance(new Locale("en", "IN"));
                      format.setMaximumFractionDigits(8);
                      format.setGroupingUsed(true);
                      return format.format(value);
                  }

                  public static double evaluate(final String str) {
                      return new Object() {
                          int pos = -1, ch;
                          void nextChar() { ch = (++pos < str.length()) ? str.charAt(pos) : -1; }
                          boolean eat(int charToEat) {
                              while (ch == ' ') nextChar();
                              if (ch == charToEat) { nextChar(); return true; }
                              return false;
                          }
                          double parse() { nextChar(); double x = parseExpression(); if (pos < str.length()) throw new RuntimeException("Error"); return x; }
                          double parseExpression() {
                              double x = parseTerm();
                              for (;;) { if (eat('+')) x += parseTerm(); else if (eat('-')) x -= parseTerm(); else return x; }
                          }
                          double parseTerm() {
                              double x = parseFactor();
                              for (;;) { if (eat('*')) x *= parseFactor(); else if (eat('/')) x /= parseFactor(); else return x; }
                          }
                          double parseFactor() {
                              if (eat('+')) return parseFactor(); if (eat('-')) return -parseFactor();
                              double x; int startPos = this.pos;
                              if (eat('(')) { x = parseExpression(); eat(')'); }
                              else if ((ch >= '0' && ch <= '9') || ch == '.') {
                                  while ((ch >= '0' && ch <= '9') || ch == '.') nextChar();
                                  x = Double.parseDouble(str.substring(startPos, this.pos));
                              } else { throw new RuntimeException("Error"); }
                              return x;
                          }
                      }.parse();
                  }
              }

              public static class ScriptEngine {
                  public static String applyScript(String input, String lang) {
                      if(input == null) return "";
                      if (lang.equals("Hindi")) {
                          return input.replace('0','०').replace('1','१').replace('2','२').replace('3','३').replace('4','४').replace('5','५').replace('6','६').replace('7','७').replace('8','८').replace('9','९');
                      } else if (lang.equals("Urdu")) {
                          return input.replace('0','۰').replace('1','۱').replace('2','۲').replace('3','۳').replace('4','۴').replace('5','۵').replace('6','۶').replace('7','۷').replace('8','۸').replace('9','۹');
                      }
                      return input; 
                  }
                  
                  public static String translateToMath(String voiceInput) {
                      String text = voiceInput.toLowerCase().trim();
                      text = text.replace("plus", "+").replace("aur", "+").replace("add", "+").replace("jodo", "+").replace("jama", "+");
                      text = text.replace("minus", "-").replace("subtract", "-").replace("ghatao", "-").replace("tafriq", "-");
                      text = text.replace("multiply", "*").replace("into", "*").replace("guna", "*").replace("zarb", "*");
                      text = text.replace("divide", "/").replace("bhag", "/").replace("taqseem", "/").replace("divided by", "/");
                      text = text.replace("x", "*").replace("÷", "/").replace("×", "*");
                      return text.replaceAll("[^0-9+\\-*/().]", ""); 
                  }
              }

              public static class HistoryEngine {
                  private static final String FILE_NAME = "calc_history_10mb.txt";
                  private static final long MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB Limit
                  
                  public static void save(Context context, String calculation) {
                      try {
                          File file = new File(context.getFilesDir(), FILE_NAME);
                          
                          if(file.exists() && file.length() > MAX_FILE_SIZE) {
                              trimHistory(context, file);
                          }
                          
                          FileOutputStream fos = context.openFileOutput(FILE_NAME, Context.MODE_APPEND);
                          fos.write((calculation + "\n").getBytes());
                          fos.close();
                      } catch (Exception e) { /* silently ignore to not crash app */ }
                  }

                  private static void trimHistory(Context context, File file) {
                      try {
                          FileInputStream fis = new FileInputStream(file);
                          BufferedReader reader = new BufferedReader(new InputStreamReader(fis));
                          ArrayList<String> lines = new ArrayList<>();
                          String line;
                          while ((line = reader.readLine()) != null) { lines.add(line); }
                          reader.close(); fis.close();
                          
                          int startIndex = (int)(lines.size() * 0.2); 
                          
                          FileOutputStream fos = context.openFileOutput(FILE_NAME, Context.MODE_PRIVATE); 
                          for (int i = startIndex; i < lines.size(); i++) {
                              fos.write((lines.get(i) + "\n").getBytes());
                          }
                          fos.close();
                      } catch(Exception e) { file.delete(); } 
                  }
                  
                  public static String load(Context context) {
                      StringBuilder sb = new StringBuilder();
                      try {
                          FileInputStream fis = context.openFileInput(FILE_NAME);
                          BufferedReader reader = new BufferedReader(new InputStreamReader(fis));
                          String line;
                          while ((line = reader.readLine()) != null) {
                              sb.insert(0, line + "\n\n"); 
                          }
                          reader.close();
                          fis.close();
                      } catch (FileNotFoundException e) {
                          return null;
                      } catch (Exception e) { return null; }
                      return sb.toString();
                  }
                  
                  public static void clear(Context context) {
                      context.deleteFile(FILE_NAME);
                  }
              }
          }
          EOF

      - name: "13. History Activity (Full Screen UI Java)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/HistoryActivity.java
          package com.zeeshan.calculator;
          
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class HistoryActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_history);

                  TextView tvHistory = findViewById(R.id.tv_history_content);
                  Button btnBack = findViewById(R.id.btn_back);
                  Button btnClear = findViewById(R.id.btn_clear);

                  String historyData = Engines.HistoryEngine.load(this);
                  if (historyData == null || historyData.trim().isEmpty()) {
                      tvHistory.setText(getString(R.string.nav_history) + " Empty");
                  } else {
                      tvHistory.setText(historyData);
                  }

                  btnBack.setOnClickListener(v -> finish());
                  
                  btnClear.setOnClickListener(v -> {
                      Engines.HistoryEngine.clear(this);
                      tvHistory.setText(getString(R.string.nav_history) + " Empty");
                      Toast.makeText(this, "History Cleared", Toast.LENGTH_SHORT).show();
                  });
              }
          }
