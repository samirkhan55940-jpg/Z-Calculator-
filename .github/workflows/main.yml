      - name: "14. Main Activity"
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/MainActivity.java
          package com.zeeshan.calculator;
          
          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.os.Process;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.appcompat.app.AppCompatDelegate;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.view.GravityCompat;
          import androidx.drawerlayout.widget.DrawerLayout;
          import java.util.ArrayList;
          import java.util.Locale;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {
              private DrawerLayout drawerLayout;
              private SpeechRecognizer speechRecognizer;
              private TextToSpeech tts;
              private TextView display, expressionDisplay, livePreviewDisplay;
              private StringBuilder currentExpression = new StringBuilder();
              private Vibrator vibrator;
              
              private String currentScript = "English";
              private Locale currentLocale = new Locale("en", "IN");
              private boolean isVoiceEnabled = true;
              
              private ExecutorService cpuExecutor = Executors.newSingleThreadExecutor();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  display = findViewById(R.id.tv_display);
                  expressionDisplay = findViewById(R.id.tv_expression);
                  livePreviewDisplay = findViewById(R.id.tv_live_preview);
                  drawerLayout = findViewById(R.id.drawer_layout);
                  
                  try { vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE); } catch(Exception e){}

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) tts.setLanguage(currentLocale);
                  });

                  setupVoice();
                  setupButtons(findViewById(R.id.calc_container));

                  Button btnSpeaker = findViewById(R.id.btn_speaker);
                  btnSpeaker.setOnClickListener(v -> {
                      isVoiceEnabled = !isVoiceEnabled;
                      btnSpeaker.setText(isVoiceEnabled ? "🔊" : "🔇");
                  });

                  findViewById(R.id.btn_menu).setOnClickListener(v -> drawerLayout.openDrawer(GravityCompat.START));
                  
                  findViewById(R.id.nav_history).setOnClickListener(v -> { 
                      drawerLayout.closeDrawer(GravityCompat.START); 
                      startActivity(new Intent(MainActivity.this, HistoryActivity.class));
                  });
                  
                  findViewById(R.id.nav_theme).setOnClickListener(v -> {
                      drawerLayout.closeDrawer(GravityCompat.START);
                      int currentNightMode = getResources().getConfiguration().uiMode & Configuration.UI_MODE_NIGHT_MASK;
                      AppCompatDelegate.setDefaultNightMode(currentNightMode == Configuration.UI_MODE_NIGHT_YES ? AppCompatDelegate.MODE_NIGHT_NO : AppCompatDelegate.MODE_NIGHT_YES);
                  });

                  Spinner langSpinner = findViewById(R.id.nav_language);
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this, android.R.layout.simple_spinner_item, new String[]{"English", "Hindi", "Urdu"});
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  langSpinner.setAdapter(adapter);
                  langSpinner.setOnItemSelectedListener(new AdapterView.OnItemSelectedListener() {
                      @Override
                      public void onItemSelected(AdapterView<?> parent, View view, int position, long id) {
                          currentScript = (String) parent.getItemAtPosition(position);
                          if(currentScript.equals("Hindi")) currentLocale = new Locale("hi", "IN");
                          else if(currentScript.equals("Urdu")) currentLocale = new Locale("ur", "PK");
                          else currentLocale = new Locale("en", "IN");
                          if(tts != null) tts.setLanguage(currentLocale);
                          updateDisplays();
                      }
                      @Override public void onNothingSelected(AdapterView<?> parent) {}
                  });

                  findViewById(R.id.btn_mic).setOnClickListener(v -> startVoiceInput());
              }

              private void setupButtons(View view) {
                  if (view instanceof ViewGroup) {
                      ViewGroup group = (ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) setupButtons(group.getChildAt(i));
                  } else if (view instanceof Button && view.getId() == View.NO_ID) {
                      view.setOnClickListener(v -> onButtonClick((Button) v));
                  }
              }

              private void onButtonClick(Button button) {
                  if (vibrator != null) { try{ vibrator.vibrate(20); } catch(Exception e){} }
                  String btnText = button.getText().toString();
                  String errorText = getString(R.string.error_msg);
                  
                  if (btnText.equals("AC")) { 
                      currentExpression.setLength(0); 
                      expressionDisplay.setText(""); 
                      livePreviewDisplay.setText("");
                      updateDisplays();
                  }
                  else if (btnText.equals("DEL")) { 
                      if (currentExpression.length() > 0) { 
                          currentExpression.deleteCharAt(currentExpression.length() - 1); 
                          updateDisplays();
                          updateLivePreview();
                      } 
                  }
                  else if (btnText.equals("=")) { calculateResult(currentExpression.toString()); }
                  else {
                      String insertText = btnText;
                      if (btnText.equals("÷")) insertText = "/";
                      if (btnText.equals("×")) insertText = "*";
                      
                      if (currentExpression.length() == 0 || display.getText().toString().equals(errorText)) { 
                          if (!insertText.equals("/") && !insertText.equals("*") && !insertText.equals("+") && !insertText.equals("-") && !insertText.equals(".")) {
                              currentExpression.setLength(0); 
                          }
                      }
                      currentExpression.append(insertText); 
                      updateDisplays();
                      updateLivePreview();
                  }
              }

              private void updateDisplays() {
                  if(currentExpression.length() == 0) display.setText(Engines.ScriptEngine.applyScript("0", currentScript));
                  else display.setText(Engines.ScriptEngine.applyScript(currentExpression.toString(), currentScript));
              }

              private void updateLivePreview() {
                  String expression = currentExpression.toString();
                  if (expression.isEmpty()) { livePreviewDisplay.setText(""); return; }
                  char lastChar = expression.charAt(expression.length() - 1);
                  if(lastChar == '+' || lastChar == '-' || lastChar == '*' || lastChar == '/' || lastChar == '.') { livePreviewDisplay.setText(""); return; }
                  
                  cpuExecutor.execute(() -> {
                      Process.setThreadPriority(Process.THREAD_PRIORITY_BACKGROUND);
                      try {
                          double rawResult = Engines.MathEngine.evaluate(expression);
                          String formattedResult = Engines.MathEngine.formatIndian(rawResult);
                          final String scriptedResult = Engines.ScriptEngine.applyScript(formattedResult, currentScript);
                          runOnUiThread(() -> livePreviewDisplay.setText(scriptedResult));
                      } catch (Exception e) { runOnUiThread(() -> livePreviewDisplay.setText("")); }
                  });
              }

              private void calculateResult(String expression) {
                  if (expression.isEmpty()) return;
                  expressionDisplay.setText(Engines.ScriptEngine.applyScript(expression, currentScript));
                  
                  cpuExecutor.execute(() -> {
                      Process.setThreadPriority(Process.THREAD_PRIORITY_FOREGROUND);
                      try {
                          double rawResult = Engines.MathEngine.evaluate(expression);
                          String formattedResult = Engines.MathEngine.formatIndian(rawResult);
                          final String scriptedResult = Engines.ScriptEngine.applyScript(formattedResult, currentScript);
                          
                          Engines.HistoryEngine.save(MainActivity.this, expression + " = " + formattedResult);
                          
                          runOnUiThread(() -> {
                              display.setText(scriptedResult);
                              livePreviewDisplay.setText("");
                              currentExpression.setLength(0);
                              
                              if (isVoiceEnabled && tts != null) {
                                  tts.speak(formattedResult, TextToSpeech.QUEUE_FLUSH, null, null);
                              }

                              String continueText = (rawResult == (long)rawResult) ? String.format(Locale.US, "%d", (long)rawResult) : String.valueOf(rawResult);
                              currentExpression.append(continueText);
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              display.setText(getString(R.string.error_msg));
                              livePreviewDisplay.setText("");
                              currentExpression.setLength(0);
                          });
                      }
                  });
              }

              private void startVoiceInput() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 1);
                  } else if (speechRecognizer != null) {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, currentLocale.toString());
                      speechRecognizer.startListening(intent);
                  }
              }

              private void setupVoice() {
                  if (SpeechRecognizer.isRecognitionAvailable(this)) {
                      speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                      speechRecognizer.setRecognitionListener(new RecognitionListener() {
                          @Override public void onReadyForSpeech(Bundle params) { display.setText("..."); livePreviewDisplay.setText(""); }
                          @Override public void onBeginningOfSpeech() {}
                          @Override public void onRmsChanged(float rmsdB) {}
                          @Override public void onBufferReceived(byte[] buffer) {}
                          @Override public void onEndOfSpeech() {}
                          @Override public void onError(int error) { updateDisplays(); }
                          @Override public void onResults(Bundle results) {
                              ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                              if (matches != null && !matches.isEmpty()) {
                                  String cleanMath = Engines.VoiceEngine.translateToMath(matches.get(0));
                                  currentExpression.setLength(0);
                                  currentExpression.append(cleanMath);
                                  updateDisplays();
                                  calculateResult(cleanMath);
                              }
                          }
                          @Override public void onPartialResults(Bundle partialResults) {}
                          @Override public void onEvent(int eventType, Bundle params) {}
                      });
                  }
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  if (speechRecognizer != null) speechRecognizer.destroy();
                  if (cpuExecutor != null) cpuExecutor.shutdown();
                  super.onDestroy();
              }
          }
          EOF

